<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Page</title>
    <link rel="stylesheet" href="style.css" />
    <script src="book.js" defer></script>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <svg
          class="logo-svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 -960 960
        960"
        >
          <path
            d="M300-80q-58
        0-99-41t-41-99v-520q0-58 41-99t99-41h500v600q-25 0-42.5 17.5T740-220q0 25
        17.5 42.5T800-160v80H300Zm-60-267q14-7 29-10t31-3h20v-440h-20q-25 0-42.5
        17.5T240-740v393Zm160-13h320v-440H400v440Zm-160 13v-453 453Zm60
        187h373q-6-14-9.5-28.5T660-220q0-16 3-31t10-29H300q-26 0-43 17.5T240-220q0
        26 17 43t43 17Z"
          />
        </svg>
        <h1>My e-Library</h1>
      </div>
      <div class="header-explanation">
        <div class="text">
          <h2>Ma bibliothèque personalisée</h2>
          <p>
            Ce mini projet a été réalisé dans le cadre de The Odin Project et
            dans le but de créer une bibliothèque dans laquelle je laisse une
            trace des livres que j'ai lu.
          </p>
        </div>
        <div class="illustration">Header illustration</div>
      </div>
      <button type="button" popovertarget="my-dialog" id="new">New Book</button>
    </div>
    <div class="container">
      <table id="table-book">
        <thead>
          <tr>
            <th scope="col">Title</th>
            <th scope="col">Author</th>
            <th scope="col">Chapter progress</th>
            <th scope="col">Status</th>
            <th scope="col">Score</th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
      <dialog id="my-dialog" popover>
        <button
          class="close"
          popovertarget="my-dialog"
          popovertargetaction="hide"
        >
          X
        </button>
        <form method="dialog" id="form">
          <h2>Add New Book</h2>
          <label for="title">Title</label>
          <input
            type="text"
            name="book-title"
            id="title"
            data-select=""
            required
          />
          <label for="author">Author</label>
          <input
            type="text"
            name="book-author"
            id="author"
            data-select=""
            required
          />
          <label for="book-pages">Chapter progress</label>
          <input
            type="number"
            name="number-of-pages"
            id="book-pages"
            min="0"
            data-select=""
            required
          />
          <label for="score">Score</label>
          <input
            type="number"
            name="book-score"
            id="score"
            data-select=""
            min="0"
            max="100"
          />
          <label for="read" class="checkbox"
            >Status

            <input type="checkbox" name="have-read" id="read" />
            <span class="checkmark"></span>
          </label>
          <div>
            <button
              popovertarget="my-dialog"
              type="button"
              id="submit"
              popovertargetaction="hide"
            >
              Save
            </button>
          </div>
        </form>
      </dialog>
    </div>
  </body>
</html>
